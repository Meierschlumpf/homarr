name: "[Deployment] Release"

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      send-notifications:
        type: boolean
        required: false
        default: true
        description: Send notifications
      push-image:
        type: boolean
        required: false
        default: true
        description: Push Docker Image

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

env:
  SKIP_ENV_VALIDATION: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  TURBO_TELEMETRY_DISABLED: 1

concurrency: production

jobs:
  release:
    name: Create tag and release
    runs-on: ubuntu-latest
    env:
      SKIP_RELEASE: ${{ github.event_name == 'workflow_dispatch' }}
    outputs:
      next: ${{ steps.read-semver.outputs.next || steps.next-fallback.outputs.next }}
      skipped: ${{ env.SKIP_RELEASE }}

    steps:
      - run: echo "Skipping release for workflow_dispatch event"
        if: env.SKIP_RELEASE
      - run: echo "next="$(echo ${{github.ref_name}} | sed 's/[^a-zA-Z0-9\-]/-/g') >> "$GITHUB_OUTPUT"
        id: next-fallback
        if: env.SKIP_RELEASE
      - uses: actions/checkout@v4
        if: env.SKIP_RELEASE == false
      - uses: actions/setup-node@v4
        if: env.SKIP_RELEASE == false
        with:
          node-version: 22
      - run: npm i -g pnpm
        if: env.SKIP_RELEASE == false
      - name: Install dependencies
        if: env.SKIP_RELEASE == false
        run: |
          pnpm install
      - name: Run Semantic Release
        if: env.SKIP_RELEASE == false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm run release
      - name: Read semver output
        if: env.SKIP_RELEASE == false
        id: read-semver
        run: |
          echo "next=\"$(git describe --tags --abbrev=0)\"" >> "$GITHUB_OUTPUT"
  deploy:
    name: Deploy docker image
    needs: release
    runs-on: ubuntu-latest
    env:
      NEXT_VERSION: ${{ needs.release.outputs.next }}
      DEPLOY_LATEST: ${{ !needs.release.outputs.skipped }}
    steps:
      - name: Discord notification
        if: ${{ github.events.inputs.send-notifications != false }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        uses: Ilshidur/action-discord@master
        with:
          args: "Deployment of an image for version '${{env.NEXT_VERSION}}' has been triggered: [run ${{ github.run_number }}](<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}>)"
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          tags: |
            ${{ env.DEPLOY_LATEST == true && 'type=raw,value=latest' || null }}
            type=raw,value=${{ env.NEXT_VERSION }}
