name: "[Deployment] Release"

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      send-notifications:
        type: boolean
        required: false
        default: true
        description: Send notifications
      push-image:
        type: boolean
        required: false
        default: true
        description: Push Docker Image

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

env:
  SKIP_ENV_VALIDATION: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  TURBO_TELEMETRY_DISABLED: 1

concurrency: production

jobs:
  release:
    name: Create tag and release
    runs-on: ubuntu-latest
    outputs:
      next: ${{ steps.read-semver.outputs.next || '' }}
    if: ${{ github.event_name != 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm i -g pnpm
      - name: Install dependencies
        run: |
          pnpm install
      - name: Run Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm run release
      - name: Read semver output
        id: read-semver
        run: |
          echo "next=\"$(git describe --tags --abbrev=0)\"" >> "$GITHUB_OUTPUT"
  deploy:
    name: Deploy docker image
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Discord notification
        if: ${{ github.events.inputs.send-notifications != false }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        uses: Ilshidur/action-discord@master
        with:
          args: "Deployment of an image has been triggered: [run ${{ github.run_number }}](<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}>)"
      - name: Echo next semver version
        run: |
          echo ${{ needs.release.outputs.next }}
          echo "Hello"
